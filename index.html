<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cardify Creator</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <!-- CDN scripts. SRI hashes should be added in production for security hardening. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="app-logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">Cardify <span class="accent">Creator</span></span>
    </div>
    <div class="header-actions">
      <button id="theme-toggle" class="icon-btn" title="Toggle dark/light mode">🌙</button>
      <button id="mobile-toggle" class="icon-btn" title="Toggle editor">☰</button>
    </div>
  </header>

  <main class="app-main">
    <!-- LEFT: Editor Panel -->
    <aside class="editor-panel" id="editor-panel">
      <div class="panel-sections">

        <!-- Section: Profile Info -->
        <section class="editor-section" id="section-profile">
          <div class="section-header">
            <h3>👤 Profile Info</h3>
            <button class="collapse-btn">▼</button>
          </div>
          <div class="section-content">
            <div class="form-group">
              <label for="input-firstname">First Name</label>
              <input type="text" id="input-firstname" placeholder="John" />
            </div>
            <div class="form-group">
              <label for="input-lastname">Last Name</label>
              <input type="text" id="input-lastname" placeholder="Doe" />
            </div>
            <div class="form-group">
              <label for="input-profession">Profession</label>
              <input type="text" id="input-profession" placeholder="UI/UX Designer" />
            </div>
            <div class="form-group">
              <label for="input-bio">Short Bio</label>
              <textarea id="input-bio" rows="3" placeholder="A short description about yourself..."></textarea>
            </div>
            <div class="form-group">
              <label for="input-photo">Profile Photo</label>
              <div class="photo-upload">
                <input type="file" id="input-photo" accept="image/*" />
                <label for="input-photo" class="upload-btn">📷 Upload Photo</label>
                <button id="remove-photo" class="remove-btn" style="display:none">✕ Remove</button>
              </div>
            </div>
          </div>
        </section>

        <!-- Section: Social Links -->
        <section class="editor-section" id="section-social">
          <div class="section-header">
            <h3>🔗 Social Links</h3>
            <button class="collapse-btn">▼</button>
          </div>
          <div class="section-content">
            <div class="social-links-editor" id="social-links-editor">
              <!-- Social link rows generated by editor.js -->
            </div>
            <button id="add-social-link" class="add-btn">+ Add Social Link</button>
          </div>
        </section>

        <!-- Section: Appearance -->
        <section class="editor-section" id="section-appearance">
          <div class="section-header">
            <h3>🎨 Appearance</h3>
            <button class="collapse-btn">▼</button>
          </div>
          <div class="section-content">
            <div class="form-group">
              <label>Layout</label>
              <div class="btn-group" id="layout-selector">
                <button class="layout-btn active" data-layout="vertical">Vertical</button>
                <button class="layout-btn" data-layout="horizontal">Horizontal</button>
              </div>
            </div>
            <div class="form-group">
              <label for="color-accent">Accent Color</label>
              <input type="color" id="color-accent" value="#4070f4" />
            </div>
            <div class="form-group">
              <label for="color-bg">Card Background</label>
              <input type="color" id="color-bg" value="#ffffff" />
            </div>
            <div class="form-group">
              <label for="color-text">Text Color</label>
              <input type="color" id="color-text" value="#333333" />
            </div>
            <div class="form-group">
              <label for="font-select">Font</label>
              <select id="font-select">
                <option value="Poppins">Poppins</option>
                <option value="Inter">Inter</option>
                <option value="Roboto">Roboto</option>
                <option value="Montserrat">Montserrat</option>
                <option value="Playfair Display">Playfair Display</option>
              </select>
            </div>
            <div class="form-group">
              <label for="border-radius">Border Radius: <span id="border-radius-val">24</span>px</label>
              <input type="range" id="border-radius" min="0" max="48" value="24" />
            </div>
            <div class="form-group">
              <label for="shadow-intensity">Shadow: <span id="shadow-intensity-val">medium</span></label>
              <input type="range" id="shadow-intensity" min="0" max="3" value="1" step="1" />
            </div>
            <div class="form-group">
              <label>Icon Style</label>
              <div class="btn-group" id="icon-style-selector">
                <button class="icon-style-btn active" data-style="filled">Filled</button>
                <button class="icon-style-btn" data-style="outline">Outline</button>
                <button class="icon-style-btn" data-style="minimal">Minimal</button>
              </div>
            </div>
          </div>
        </section>

        <!-- Section: Templates -->
        <section class="editor-section" id="section-templates">
          <div class="section-header">
            <h3>📋 Templates</h3>
            <button class="collapse-btn">▼</button>
          </div>
          <div class="section-content">
            <div class="default-templates">
              <p class="section-label">Starter Templates</p>
              <div class="template-grid" id="starter-templates">
                <!-- Rendered by templates.js -->
              </div>
            </div>
            <div class="saved-templates">
              <p class="section-label">Saved Templates</p>
              <div class="template-grid" id="saved-templates">
                <!-- Rendered by templates.js -->
              </div>
              <button id="save-template-btn" class="save-btn">💾 Save Current as Template</button>
            </div>
          </div>
        </section>

      </div>
    </aside>

    <!-- RIGHT: Preview Panel -->
    <section class="preview-panel">
      <div class="preview-header">
        <h2>Live Preview</h2>
        <div class="export-actions">
          <button class="export-btn" id="export-png">⬇ PNG</button>
          <button class="export-btn" id="export-svg">⬇ SVG</button>
          <button class="export-btn" id="export-pdf">⬇ PDF</button>
          <button class="export-btn" id="export-json">⬇ JSON</button>
          <button class="export-btn" id="export-html">⬇ HTML</button>
        </div>
      </div>
      <div class="preview-canvas">
        <div class="preview-scaler">
          <div id="card-preview" class="card vertical">
            <div class="card-header-bg"></div>
            <div class="card-photo-wrapper">
              <img id="preview-photo" src="" alt="Profile Photo" class="card-photo" />
              <div id="preview-photo-placeholder" class="card-photo-placeholder">👤</div>
            </div>
            <div class="card-body">
              <h2 class="card-name" id="preview-name">John Doe</h2>
              <p class="card-profession" id="preview-profession">UI/UX Designer</p>
              <p class="card-bio" id="preview-bio">A short description about yourself.</p>
              <div class="card-social" id="preview-social">
                <!-- Social icons rendered by preview.js -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast notification -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- JS modules -->
  <script src="js/utils.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/preview.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/export.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
